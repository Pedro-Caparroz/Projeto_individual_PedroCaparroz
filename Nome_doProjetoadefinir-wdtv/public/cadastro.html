<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Desvalorização da Moda | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/style_home.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap" rel="stylesheet">
</head>

<body>
  
  <header>
    <div class="logo">
        <img src="./assets/" alt="">
    </div>
    <div class="div_navbar">
        <a href="/index.html">Inicial</a>
        <a href="/login.html">Login</a>
        <a href="/cadastro.html">Cadastro</a>
    </div>
  </header>

  <section class="banner_login">
    <div class="card_login" style="width: 500px;">
      <h2>Crie sua conta</h2>
      
      <div class="alerta_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>

      <div class="formulario">
        <div class="campo">
          <span>Nome</span>
          <input id="nome_input" type="text" placeholder="Seu nome completo" />
        </div>
        <div class="campo">
          <span>E-mail</span>
          <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
        </div>
        <div class="campo">
          <span>Data de nascimento</span>
          <input id="data_nascimento_input" type="date" />
        </div>
        <div class="campo">
          <span>Gênero</span>
          <div class="opcoes_genero">
            <label><input id="genero_m" type="radio" name="genero" value="M" /> Masculino</label>
            <label><input id="genero_f" type="radio" name="genero" value="F" /> Feminino</label>
            <label><input id="genero_o" type="radio" name="genero" value="O" /> Outro</label>
          </div>
        </div>
        <div class="campo">
          <span>Senha</span>
          <input id="senha_input" type="password" placeholder="******" />
        </div>
        <div class="campo">
          <span>Confirmação da Senha</span>
          <input id="confirmacao_senha_input" type="password" placeholder="******" />
        </div>
        <button class="botao_CTA" onclick="cadastrar()">Criar conta</button>
      </div>

      <div id="div_aguardar" class="loading-div">
        <img src="./assets/circle-loading.gif" id="loading-gif" />
      </div>

      <div id="div_erros_login"></div>
    </div>
  </section>

</body>

</html>

<script>

  // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var data_nascimentoVar = data_nascimento_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var tipoVar = 'comum'

    // para Buscar a oção de gênero selecionada temos que fazer um caminho diferente por ser radio button
    // query selector pega o elemento que tem o nome genero e que esta marcado

    var genero_selecionado = document.querySelector('input[name="genero"]:checked')

    // se estiver algo marcado ele pega o valor se não ele atribui valor vazio a variável e já atribui o valor a variavel generoVar
    var generoVar = genero_selecionado ? genero_selecionado.value : "";


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      data_nascimentoVar == "" ||
      generoVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Todos os campos devem ser preenchidos";

      finalizarAguardar();
      return false;
    }
    else if (!emailVar.includes('@') || !emailVar.includes('.')) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Insira um email válido";

      finalizarAguardar();
      return false;
    } else if (senhaVar.length < 8) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha deve ter pelo menos 8 caracteres";

      finalizarAguardar();
      return false;
    } else if (senhaVar.includes(' ')) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha não pode conter espaços";

      finalizarAguardar();
      return false;
    } else if (!/[a-z]/.test(senhaVar) || !/[A-Z]/.test(senhaVar)) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha deve conter letra maiúscula e minúscula";

      finalizarAguardar();
      return false;
    } else if (!/[0-9]/.test(senhaVar)) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha deve conter número";

      finalizarAguardar();
      return false;
    } else if (!/[^a-zA-Z0-9]/.test(senhaVar)) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "A senha deve conter caractere especial";

      finalizarAguardar();
      return false;
    } else if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "As senhas estão diferentes";

      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    // A verificação de empresa foi removida pois não faz mais sentido para o projeto atual

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        generoServer: generoVar,
        data_nascimentoServer: data_nascimentoVar,
        senhaServer: senhaVar,
        tipoServer: tipoVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
